<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1090">
  @for (t of toast.toasts(); track t.id) {
    <div
      class="toast show align-items-center text-white border-0 mb-2"
      [class.bg-success]="t.type === 'success'"
      [class.bg-danger]="t.type === 'error'"
      [class.bg-primary]="t.type === 'info'"
      role="alert"
      aria-live="assertive"
      aria-atomic="true"
    >
      <div class="d-flex">
        <div class="toast-body">
          <i
            class="bi me-1"
            [class.bi-check-circle]="t.type === 'success'"
            [class.bi-exclamation-triangle]="t.type === 'error'"
            [class.bi-info-circle]="t.type === 'info'"
          ></i>
          {{ t.message }}
        </div>
        <button
          type="button"
          class="btn-close btn-close-white me-2 m-auto"
          aria-label="Cerrar"
          (click)="toast.dismiss(t.id)"
        ></button>
      </div>
    </div>
  }
</div>
