<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4 text-center">
        <i class="bi bi-envelope-check display-4" style="color: var(--primary)"></i>
        <h3 class="mt-3 fw-bold">Revisá tu email</h3>
        <p class="text-muted">
          Te enviamos un link de verificación. Hacé clic en él para activar tu cuenta.
        </p>

        <button
          class="btn btn-outline-primary w-100 mt-2"
          (click)="resend()"
          [disabled]="loading()"
        >
          @if (loading()) {
            <span class="spinner-border spinner-border-sm me-1" role="status"></span>
          }
          <i class="bi bi-arrow-repeat me-1"></i>Reenviar email
        </button>

        <p class="mt-4 text-muted mb-0">
          ¿Ya lo verificaste? <a routerLink="/login">Iniciar sesión</a>
        </p>
      </div>
    </div>
  </div>
</div>
